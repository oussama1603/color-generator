<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>color generator</title>
  <link rel="stylesheet" href="colorgenerator.css">
</head>
<body>
  <div class="container">
    <h1>Color Palette Generator</h1>
    <button id="generate-btn">
      <i class="fas fa-sync-alt"></i>
      Generate Palette
    </button>
    <div class="palette-container">
      <div class="color-box">
        <div class="color" style="background-color: #e1f5;"></div>
        <div class="color-info">
          <span class="hex-value">#E1F5</span>
          <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
        </div>
      </div>
      <div class="color-box">
        <div class="color" style="background-color: #e85;"></div>
        <div class="color-info">
          <span class="hex-value">#E85</span>
          <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
        </div>
      </div>
      <div class="color-box">
        <div class="color" style="background-color: #a192a1;"></div>
        <div class="color-info">
          <span class="hex-value">#A192A1</span>
          <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
        </div>
      </div>
      <div class="color-box">
        <div class="color" style="background-color: #06ffc1;"></div>
        <div class="color-info">
          <span class="hex-value">#06FFC1</span>
          <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
        </div>
      </div>
      <div class="color-box">
        <div class="color" style="background-color: #012e01;"></div>
        <div class="color-info">
          <span class="hex-value">#012E01</span>
          <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
        </div>
      </div>
    </div>
  </div>
  <script src="colorgenearot.js"></script>
</body>
</html>
